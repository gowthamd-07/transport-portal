apiVersion: v1
kind: Namespace
metadata:
  name: transfleet

---
apiVersion: v1
kind: Secret
metadata:
  name: transfleet-secret
  namespace: transfleet
type: Opaque
stringData:
  POSTGRES_PASSWORD: postgres
  JWT_SECRET: "3I6JYf9n7Q3VnL5jNqJ4wYJY7jLzD0nL7m4sR2vH8aT9eK5cP1xM6uB4qF0rN8yZsW3tE7gH2kL9pQ6vC1dA=="

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: transfleet-config
  namespace: transfleet
data:
  POSTGRES_DB: transport
  POSTGRES_USER: postgres

  PORT: "3001"
  NODE_ENV: "production"

  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/transport"

  CORS_ORIGINS: "http://localhost:30080"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: transfleet
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: transfleet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine

        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: transfleet-config
              key: POSTGRES_DB

        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: transfleet-config
              key: POSTGRES_USER

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: transfleet-secret
              key: POSTGRES_PASSWORD

        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data

      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: transfleet
spec:
  selector:
    app: postgres

  ports:
  - port: 5432
    targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: transfleet
spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: localhost/transfleet-backend:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 3001

        envFrom:
        - configMapRef:
            name: transfleet-config

        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: transfleet-secret
              key: JWT_SECRET

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: transfleet
spec:
  selector:
    app: backend

  ports:
  - port: 3001
    targetPort: 3001

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: transfleet
spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: localhost/transfleet-frontend:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: transfleet
spec:
  type: NodePort

  selector:
    app: frontend

  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
